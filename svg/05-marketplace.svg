<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1800" viewBox="0 0 1060 1800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap');
      .font-head { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
      .font-body { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
    </style>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1060" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#004C99"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#004C99"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1060" height="1800" fill="#fff"/>

  <!-- ===== GNB ===== -->
  <rect width="1060" height="64" fill="#fff" stroke="#E2E4EA" stroke-width="1"/>
  <text x="40" y="38" class="font-head" font-size="20" font-weight="800" fill="#1A1A2E">T-Rise<tspan fill="#22C55E">Up</tspan></text>
  <text x="670" y="37" class="font-body" font-size="14" font-weight="500" fill="#4A4A68">제품 ▾</text>
  <text x="740" y="37" class="font-body" font-size="14" font-weight="500" fill="#4A4A68">도입사례</text>
  <rect x="840" y="20" width="120" height="32" rx="6" fill="#0066CC"/>
  <text x="872" y="41" class="font-body" font-size="13" font-weight="600" fill="#fff">무료 데모 신청</text>

  <!-- ===== HERO (64~380) ===== -->
  <rect y="64" width="1060" height="316" fill="url(#heroGrad)"/>
  <rect x="0" y="360" width="1060" height="20" rx="20" fill="#fff"/>
  <!-- Badge -->
  <rect x="435" y="120" width="190" height="30" rx="15" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="530" y="140" class="font-body" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Marketplace</text>
  <!-- Title -->
  <text x="530" y="200" class="font-head" font-size="38" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-0.02em">RIDEUS Marketplace</text>
  <!-- Sub -->
  <text x="530" y="245" class="font-body" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">T-RiseUp 고객이라면 RIDEUS 생태계를 통해 판매 채널을 확장하세요.</text>
  <text x="530" y="275" class="font-body" font-size="16" fill="rgba(255,255,255,0.65)" text-anchor="middle">모빌리티 상품의 유통과 판매를 연결하는 오픈 마켓플레이스</text>

  <!-- ===== S1. Coming Soon (400~600) ===== -->
  <rect y="400" width="1060" height="200" fill="#F7F8FC"/>
  <rect x="430" y="430" width="200" height="36" rx="18" fill="rgba(0,102,204,0.08)"/>
  <text x="530" y="454" class="font-head" font-size="16" font-weight="700" fill="#0066CC" text-anchor="middle">Coming Soon</text>
  <text x="530" y="500" class="font-head" font-size="24" font-weight="800" fill="#1A1A2E" text-anchor="middle">RIDEUS 생태계와 연결되는 오픈 마켓플레이스</text>
  <text x="530" y="535" class="font-body" font-size="15" fill="#4A4A68" text-anchor="middle">T-RiseUp으로 만든 모빌리티 상품을 RIDEUS Marketplace에서 유통하고,</text>
  <text x="530" y="560" class="font-body" font-size="15" fill="#4A4A68" text-anchor="middle">전국의 이용자에게 직접 판매할 수 있습니다.</text>

  <!-- ===== S2. Key Features (620~920) ===== -->
  <text x="530" y="660" class="font-head" font-size="26" font-weight="800" fill="#1A1A2E" text-anchor="middle">주요 기능</text>
  <!-- 4 Feature Cards -->
  <g transform="translate(40,690)">
    <rect width="475" height="100" rx="12" fill="#fff" stroke="#E2E4EA"/>
    <rect x="16" y="16" width="50" height="50" rx="10" fill="rgba(0,102,204,0.08)"/>
    <text x="41" y="47" class="font-head" font-size="20" fill="#0066CC" text-anchor="middle">S</text>
    <text x="82" y="38" class="font-body" font-size="16" font-weight="700" fill="#1A1A2E">상품 등록 · 노출</text>
    <text x="82" y="60" class="font-body" font-size="13" fill="#4A4A68">TMS에서 생성한 상품을 마켓플레이스에 즉시 등록</text>
    <text x="82" y="80" class="font-body" font-size="13" fill="#8888A0">자동 연동 · 재고 실시간 동기화</text>
  </g>
  <g transform="translate(545,690)">
    <rect width="475" height="100" rx="12" fill="#fff" stroke="#E2E4EA"/>
    <rect x="16" y="16" width="50" height="50" rx="10" fill="rgba(0,102,204,0.08)"/>
    <text x="41" y="47" class="font-head" font-size="20" fill="#0066CC" text-anchor="middle">P</text>
    <text x="82" y="38" class="font-body" font-size="16" font-weight="700" fill="#1A1A2E">통합 결제 · 정산</text>
    <text x="82" y="60" class="font-body" font-size="13" fill="#4A4A68">RIDEUS 결제 인프라를 통한 글로벌 결제 지원</text>
    <text x="82" y="80" class="font-body" font-size="13" fill="#8888A0">자동 정산 · 수수료 투명 관리</text>
  </g>
  <g transform="translate(40,805)">
    <rect width="475" height="100" rx="12" fill="#fff" stroke="#E2E4EA"/>
    <rect x="16" y="16" width="50" height="50" rx="10" fill="rgba(0,102,204,0.08)"/>
    <text x="41" y="47" class="font-head" font-size="20" fill="#0066CC" text-anchor="middle">D</text>
    <text x="82" y="38" class="font-body" font-size="16" font-weight="700" fill="#1A1A2E">데이터 분석</text>
    <text x="82" y="60" class="font-body" font-size="13" fill="#4A4A68">판매 현황 · 고객 트렌드 · 노선별 성과 분석</text>
    <text x="82" y="80" class="font-body" font-size="13" fill="#8888A0">실시간 대시보드 · 인사이트 리포트</text>
  </g>
  <g transform="translate(545,805)">
    <rect width="475" height="100" rx="12" fill="#fff" stroke="#E2E4EA"/>
    <rect x="16" y="16" width="50" height="50" rx="10" fill="rgba(0,102,204,0.08)"/>
    <text x="41" y="47" class="font-head" font-size="20" fill="#0066CC" text-anchor="middle">R</text>
    <text x="82" y="38" class="font-body" font-size="16" font-weight="700" fill="#1A1A2E">리뷰 · 평점 관리</text>
    <text x="82" y="60" class="font-body" font-size="13" fill="#4A4A68">이용자 리뷰 수집 · 평점 기반 노출 최적화</text>
    <text x="82" y="80" class="font-body" font-size="13" fill="#8888A0">고객 신뢰 구축 · 품질 관리</text>
  </g>

  <!-- ===== S3. Ecosystem Placeholder (940~1100) ===== -->
  <rect y="940" width="1060" height="160" fill="#F7F8FC"/>
  <text x="530" y="990" class="font-head" font-size="22" font-weight="800" fill="#1A1A2E" text-anchor="middle">RIDEUS 생태계</text>
  <rect x="130" y="1010" width="800" height="70" rx="12" fill="#E2E4EA"/>
  <text x="530" y="1050" class="font-body" font-size="14" fill="#8888A0" text-anchor="middle">[RIDEUS Marketplace 생태계 다이어그램 — 운영사 → T-RiseUp → Marketplace → 이용자]</text>

  <!-- ===== CTA Band ===== -->
  <rect y="1140" width="1060" height="140" fill="url(#ctaGrad)"/>
  <text x="530" y="1195" class="font-head" font-size="28" font-weight="800" fill="#fff" text-anchor="middle">Marketplace 오픈 알림을 받으세요</text>
  <text x="530" y="1225" class="font-body" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">사전 등록하고 가장 먼저 Marketplace를 경험하세요.</text>
  <rect x="440" y="1240" width="180" height="44" rx="10" fill="#fff"/>
  <text x="530" y="1267" class="font-body" font-size="16" font-weight="600" fill="#0066CC" text-anchor="middle">사전 등록 신청</text>

  <!-- ===== Footer ===== -->
  <rect y="1320" width="1060" height="170" fill="#1A1F2E"/>
  <text x="40" y="1360" class="font-head" font-size="18" font-weight="800" fill="#fff">T-Rise<tspan fill="#22C55E">Up</tspan></text>
  <text x="40" y="1385" class="font-body" font-size="13" fill="rgba(255,255,255,0.5)">(주)그라운드케이 | 대표이사: 홍길동</text>
  <text x="40" y="1405" class="font-body" font-size="13" fill="rgba(255,255,255,0.4)">부산광역시 해운대구 | TEL: 051-000-0000</text>
  <text x="500" y="1360" class="font-body" font-size="14" font-weight="700" fill="#fff">제품</text>
  <text x="500" y="1385" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">PMS — 의전·수송</text>
  <text x="500" y="1405" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">TMS — 셔틀·관광</text>
  <text x="500" y="1425" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">면허 솔루션</text>
  <text x="500" y="1445" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">Marketplace</text>
  <text x="750" y="1360" class="font-body" font-size="14" font-weight="700" fill="#fff">약관</text>
  <text x="750" y="1385" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">개인정보처리방침</text>
  <text x="750" y="1405" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">이용약관</text>
  <text x="750" y="1425" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">위치 기반 서비스 이용약관</text>
  <line x1="40" y1="1460" x2="1020" y2="1460" stroke="rgba(255,255,255,0.1)"/>
  <text x="530" y="1482" class="font-body" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">© 2026 GroundK. All rights reserved.</text>
</svg>