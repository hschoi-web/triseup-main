<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="1500" viewBox="0 0 1060 1500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap');
      .font-head { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
      .font-body { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
    </style>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1060" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#004C99"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="1060" height="1500" fill="#F7F8FC"/>

  <!-- ===== GNB ===== -->
  <rect width="1060" height="64" fill="#fff" stroke="#E2E4EA" stroke-width="1"/>
  <text x="40" y="38" class="font-head" font-size="20" font-weight="800" fill="#1A1A2E">T-Rise<tspan fill="#22C55E">Up</tspan></text>
  <text x="670" y="37" class="font-body" font-size="14" font-weight="500" fill="#4A4A68">제품 ▾</text>
  <text x="740" y="37" class="font-body" font-size="14" font-weight="500" fill="#4A4A68">도입사례</text>
  <rect x="840" y="20" width="120" height="32" rx="6" fill="#0066CC"/>
  <text x="872" y="41" class="font-body" font-size="13" font-weight="600" fill="#fff">무료 데모 신청</text>

  <!-- ===== HERO (64~280) ===== -->
  <rect y="64" width="1060" height="216" fill="url(#heroGrad)"/>
  <rect x="0" y="260" width="1060" height="20" rx="20" fill="#F7F8FC"/>
  <text x="530" y="155" class="font-head" font-size="38" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-0.02em">무료 데모 신청</text>
  <text x="530" y="195" class="font-body" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">귀사의 운영 환경에 맞는 맞춤 데모를 준비해 드립니다.</text>
  <text x="530" y="225" class="font-body" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">영업일 기준 1~2일 이내에 담당자가 연락드립니다.</text>

  <!-- ===== FORM SECTION (300~1080) ===== -->
  <g transform="translate(180,310)">
    <rect width="700" height="740" rx="16" fill="#fff" stroke="#E2E4EA"/>
    <text x="350" y="50" class="font-head" font-size="22" font-weight="800" fill="#1A1A2E" text-anchor="middle">데모 신청서</text>

    <!-- 회사명 -->
    <text x="40" y="95" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">회사명 *</text>
    <rect x="40" y="105" width="620" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="56" y="132" class="font-body" font-size="14" fill="#8888A0">회사명을 입력해주세요</text>

    <!-- 담당자 성명 + 이메일 -->
    <text x="40" y="180" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">담당자 성명 *</text>
    <rect x="40" y="190" width="295" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="56" y="217" class="font-body" font-size="14" fill="#8888A0">성명</text>
    <text x="365" y="180" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">이메일 *</text>
    <rect x="365" y="190" width="295" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="381" y="217" class="font-body" font-size="14" fill="#8888A0">name@company.com</text>

    <!-- 연락처 + 관심 제품 -->
    <text x="40" y="265" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">연락처 *</text>
    <rect x="40" y="275" width="295" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="56" y="302" class="font-body" font-size="14" fill="#8888A0">010-0000-0000</text>
    <text x="365" y="265" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">관심 제품 *</text>
    <rect x="365" y="275" width="295" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="381" y="302" class="font-body" font-size="14" fill="#8888A0">선택해주세요 ▾</text>

    <!-- 차량 규모 -->
    <text x="40" y="350" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">차량 규모</text>
    <rect x="40" y="360" width="620" height="44" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="56" y="387" class="font-body" font-size="14" fill="#8888A0">예: 50대</text>

    <!-- 문의 내용 -->
    <text x="40" y="435" class="font-body" font-size="14" font-weight="600" fill="#1A1A2E">문의 내용</text>
    <rect x="40" y="445" width="620" height="120" rx="8" fill="#fff" stroke="#E2E4EA"/>
    <text x="56" y="475" class="font-body" font-size="14" fill="#8888A0">궁금하신 사항이나 요청사항을 자유롭게 작성해주세요.</text>

    <!-- 개인정보동의 -->
    <rect x="40" y="590" width="20" height="20" rx="4" fill="#fff" stroke="#E2E4EA" stroke-width="1.5"/>
    <text x="70" y="606" class="font-body" font-size="13" fill="#4A4A68">개인정보 수집 및 이용에 동의합니다. (필수)</text>
    <text x="480" y="606" class="font-body" font-size="12" font-weight="500" fill="#0066CC">내용 보기</text>

    <!-- 제출 버튼 -->
    <rect x="40" y="640" width="620" height="52" rx="10" fill="#0066CC"/>
    <text x="350" y="672" class="font-body" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">데모 신청하기</text>

    <!-- 안내 -->
    <text x="350" y="720" class="font-body" font-size="12" fill="#8888A0" text-anchor="middle">제출된 정보는 데모 준비 목적으로만 사용되며, 데모 완료 후 안전하게 파기됩니다.</text>
  </g>

  <!-- ===== Footer ===== -->
  <rect y="1100" width="1060" height="170" fill="#1A1F2E"/>
  <text x="40" y="1140" class="font-head" font-size="18" font-weight="800" fill="#fff">T-Rise<tspan fill="#22C55E">Up</tspan></text>
  <text x="40" y="1165" class="font-body" font-size="13" fill="rgba(255,255,255,0.5)">(주)그라운드케이 | 대표이사: 홍길동</text>
  <text x="40" y="1185" class="font-body" font-size="13" fill="rgba(255,255,255,0.4)">부산광역시 해운대구 | TEL: 051-000-0000</text>
  <text x="500" y="1140" class="font-body" font-size="14" font-weight="700" fill="#fff">제품</text>
  <text x="500" y="1165" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">PMS — 의전·수송</text>
  <text x="500" y="1185" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">TMS — 셔틀·관광</text>
  <text x="500" y="1205" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">면허 솔루션</text>
  <text x="500" y="1225" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">Marketplace</text>
  <text x="750" y="1140" class="font-body" font-size="14" font-weight="700" fill="#fff">약관</text>
  <text x="750" y="1165" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">개인정보처리방침</text>
  <text x="750" y="1185" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">이용약관</text>
  <text x="750" y="1205" class="font-body" font-size="14" fill="rgba(255,255,255,0.5)">위치 기반 서비스 이용약관</text>
  <line x1="40" y1="1240" x2="1020" y2="1240" stroke="rgba(255,255,255,0.1)"/>
  <text x="530" y="1262" class="font-body" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">© 2026 GroundK. All rights reserved.</text>
</svg>